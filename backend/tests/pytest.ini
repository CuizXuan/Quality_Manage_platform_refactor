[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    p0: 核心流程冒烟测试
    p1: 重要功能测试
    p2: 边界/异常测试
    api: API 接口测试
    unit: 单元测试
    integration: 集成测试
    cases: 用例模块
    scenarios: 场景模块
    environments: 环境模块
    logs: 日志模块
    datasets: 数据集模块
    mocks: MOCK 模块
    reports: 报告模块
    coverage: 代码质量模块
    defects: 缺陷管理模块
