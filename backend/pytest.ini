# =============================================================================
# pytest 配置文件 - Quality_Manage_platform
# =============================================================================
# 用途：配置 pytest 行为，生成美观的测试报告
# =============================================================================

[pytest]
# ------------------------------
# 基本选项
# ------------------------------
minversion = 8.0
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    -p no:cacheprovider

# 测试目录
testpaths = tests

# Python 文件匹配
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

# ------------------------------
# 报告相关
# ------------------------------
# HTML 报告配置（pytest-html）
html_report_title = Quality_Manage_platform 测试报告
report_legend = true
report_style = default

# Allure 结果目录（如果安装了 allure-pytest）
# addopts += --alluredir=reports/allure-results

# ------------------------------
# 标记（自定义标签）
# ------------------------------
markers =
    # 优先级
    p0: P0级测试用例，核心流程（冒烟测试）
    p1: P1级测试用例，重要功能
    p2: P2级测试用例，边界/异常情况

    # 模块
    projects: 项目管理模块测试
    cases: 用例管理模块测试
    defects: 缺陷管理模块测试
    scenarios: 场景管理模块测试
    environments: 环境管理模块测试

    # 类型
    api: API测试
    unit: 单元测试
    integration: 集成测试
    smoke: 冒烟测试

    # 状态
    slow: 执行较慢的测试
    skip_ci: CI环境中跳过

# ------------------------------
# 日志配置
# ------------------------------
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = reports/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# ------------------------------
# 覆盖范围
# ------------------------------
# addopts = --cov=app --cov-report=html --cov-report=term

# ------------------------------
# 过滤警告
# ------------------------------
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
