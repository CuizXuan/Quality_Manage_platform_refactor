# =============================================================================
# pytest configuration - Quality_Manage_platform
# =============================================================================

[pytest]
# ------------------------------
# Basic Options
# ------------------------------
minversion = 8.0
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    -p no:cacheprovider

# Test directory
testpaths = tests

# Python file matching
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

# ------------------------------
# Report Options
# ------------------------------
html_report_title = Quality_Manage_platform Test Report
report_legend = true
report_style = default

# ------------------------------
# Markers
# ------------------------------
markers =
    p0: P0 core flow smoke tests
    p1: P1 important features
    p2: P2 boundary/edge cases

    projects: Project management tests
    cases: Case management tests
    defects: Defect management tests
    scenarios: Scenario management tests
    environments: Environment management tests

    api: API tests
    unit: Unit tests
    integration: Integration tests
    smoke: Smoke tests

    slow: Slow tests
    skip_ci: Skip in CI

# ------------------------------
# Logging
# ------------------------------
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = reports/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# ------------------------------
# Warnings
# ------------------------------
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning